let currentFilter = 'all';

function renderPrompts(filter = 'all') {
    const grid = document.getElementById('prompts-grid');
    let filtered = allPrompts;
    
    if (filter !== 'all') {
        filtered = allPrompts.filter(p => {
            if (filter === 'video') return p.category === '视频创作';
            if (filter === 'image') return p.category === 'AI绘画';
            if (filter === 'ui') return p.category === 'UI设计';
            return true;
        });
    }
    
    grid.innerHTML = filtered.map(p => `
        <div class="prompt-card" data-id="${p.id}">
            <img class="prompt-image" src="${p.imageUrl}" alt="${p.title}" loading="lazy" onerror="this.style.display='none'">
            <div class="prompt-content">
                <div class="prompt-title">${p.title}</div>
                <div class="prompt-desc">${p.content.substring(0, 150)}...</div>
                <div class="prompt-tags">
                    <span class="tag">${p.category}</span>
                    ${p.tags.slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

function filterPrompts(category) {
    currentFilter = category;
    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
    event.target.classList.add('active');
    renderPrompts(category);
}

function log(message, type = 'info') {
    const logEl = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = `log-entry log-${type}`;
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
}

async function importAll() {
    await importPrompts(allPrompts);
}

async function importByCategory(category) {
    const filtered = allPrompts.filter(p => {
        if (category === 'video') return p.category === '视频创作';
        if (category === 'image') return p.category === 'AI绘画';
        return true;
    });
    await importPrompts(filtered);
}

async function importPrompts(promptsToImport) {
    const container = document.getElementById('progress-container');
    const statusText = document.getElementById('status-text');
    const progressFill = document.getElementById('progress-fill');
    const logEl = document.getElementById('log');
    
    container.style.display = 'block';
    logEl.innerHTML = '';
    
    // 获取现有数据
    const STORAGE_KEY = 'prompt-manager-data-v2';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"prompts":[],"categories":[]}');
    
    // 确保分类存在
    const categories = ['视频创作', 'AI绘画', 'UI设计'];
    categories.forEach(catName => {
        const exists = data.categories.find(c => c.name === catName);
        if (!exists) {
            const colors = { '视频创作': '#ef4444', 'AI绘画': '#8b5cf6', 'UI设计': '#3b82f6' };
            data.categories.push({
                id: 'cat-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
                name: catName,
                description: catName + '提示词',
                color: colors[catName],
                order: data.categories.length
            });
        }
    });
    
    log(`开始导入 ${promptsToImport.length} 个提示词...`);
    
    let successCount = 0;
    let skipCount = 0;
    
    for (let i = 0; i < promptsToImport.length; i++) {
        const p = promptsToImport[i];
        statusText.textContent = `正在导入 (${i + 1}/${promptsToImport.length}): ${p.title}`;
        progressFill.style.width = `${((i + 1) / promptsToImport.length) * 100}%`;
        
        // 检查是否已存在
        const exists = data.prompts.some(existing => existing.title === p.title);
        if (exists) {
            log(`跳过已存在: ${p.title}`, 'info');
            skipCount++;
            continue;
        }
        
        // 获取分类ID
        const category = data.categories.find(c => c.name === p.category);
        const categoryId = category ? category.id : null;
        
        // 创建新提示词
        const newPrompt = {
            id: 'prompt-' + Date.now() + '-' + i,
            title: p.title,
            content: p.content,
            sourceType: 'TEXT',
            sourceUrl: p.id.startsWith('sd') ? 'https://youmind.com/zh-CN/seedance-2-0-prompts' : 'https://youmind.com/zh-CN/gpt-image-2-prompts',
            categoryId: categoryId,
            tags: p.tags,
            isPublic: false,
            viewCount: 0,
            useCount: 0,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        
        // 尝试获取缩略图
        try {
            const response = await fetch(p.imageUrl);
            if (response.ok) {
                const blob = await response.blob();
                const reader = new FileReader();
                await new Promise((resolve) => {
                    reader.onloadend = () => {
                        newPrompt.sourceType = 'IMAGE';
                        newPrompt.sourceFileData = reader.result;
                        resolve();
                    };
                    reader.readAsDataURL(blob);
                });
            }
        } catch (e) {
            log(`无法加载图片: ${p.title}`, 'error');
        }
        
        data.prompts.push(newPrompt);
        successCount++;
        log(`✓ 已导入: ${p.title}`, 'success');
        
        // 小延迟避免阻塞
        await new Promise(r => setTimeout(r, 150));
    }
    
    // 保存数据
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    
    statusText.textContent = `导入完成！成功: ${successCount}, 跳过: ${skipCount}`;
    log(`导入完成！成功: ${successCount}, 跳过: ${skipCount}`, 'success');
    
    alert(`导入完成！\n成功: ${successCount} 个\n跳过: ${skipCount} 个\n\n请刷新 Prompt Manager 页面查看。`);
}
