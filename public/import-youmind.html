// 渲染预览
function renderPrompts() {
  const container = document.getElementById('prompts-list');
  container.innerHTML = youmindPrompts.map((p, i) => `
    <div class="prompt-card">
      <div class="prompt-title">${i+1}. ${p.title}</div>
      <div class="prompt-content">${p.content.substring(0, 200)}...</div>
      <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

// 导入到 localStorage
async function importAll() {
  const status = document.getElementById('status');
  const statusText = document.getElementById('status-text');
  const progressBar = document.getElementById('progress-bar');
  status.style.display = 'block';
  
  // 获取现有数据
  const STORAGE_KEY = 'prompt-manager-data-v2';
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"prompts":[],"categories":[]}');
  
  // 确保视频创作分类存在
  const videoCat = data.categories.find(c => c.name === '视频创作');
  let videoCatId = videoCat?.id;
  if (!videoCatId) {
    videoCatId = 'cat-video-' + Date.now();
    data.categories.push({
      id: videoCatId,
      name: '视频创作',
      description: '视频生成提示词',
      color: '#ef4444',
      order: data.categories.length
    });
  }
  
  // 导入每个提示词
  for (let i = 0; i < youmindPrompts.length; i++) {
    const p = youmindPrompts[i];
    statusText.textContent = `正在导入: ${p.title}`;
    progressBar.style.width = `${((i + 1) / youmindPrompts.length) * 100}%`;
    
    // 检查是否已存在
    const exists = data.prompts.some(existing => existing.title === p.title);
    if (exists) {
      console.log(`跳过已存在: ${p.title}`);
      continue;
    }
    
    // 获取缩略图（如果可能）
    let imageData = null;
    try {
      const response = await fetch(p.imageUrl);
      const blob = await response.blob();
      imageData = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    } catch (e) {
      console.log(`无法加载图片: ${p.title}`);
    }
    
    // 创建新提示词
    const newPrompt = {
      id: 'prompt-' + Date.now() + '-' + i,
      title: p.title,
      content: p.content,
      sourceType: 'TEXT',
      sourceUrl: 'https://youmind.com/zh-CN/seedance-2-0-prompts',
      categoryId: videoCatId,
      tags: p.tags,
      isPublic: false,
      viewCount: 0,
      useCount: 0,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    
    if (imageData) {
      newPrompt.sourceType = 'IMAGE';
      newPrompt.sourceFileData = imageData;
    }
    
    data.prompts.push(newPrompt);
    
    // 小延迟避免阻塞
    await new Promise(r => setTimeout(r, 100));
  }
  
  // 保存数据
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  
  statusText.textContent = `导入完成！共导入 ${youmindPrompts.length} 个提示词`;
  progressBar.style.width = '100%';
  progressBar.style.background = '#22c55e';
  
  alert('导入完成！请刷新 Prompt Manager 页面查看。');
}
